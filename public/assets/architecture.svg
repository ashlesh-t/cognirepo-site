<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="gm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="ga" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="arrow-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0.2"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#7c6af7" opacity="0.7"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#38bdf8" opacity="0.6"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#4ade80" opacity="0.6"/>
    </marker>
    <marker id="arr-y" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#fbbf24" opacity="0.6"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="150" y1="0" x2="150" y2="620"/>
    <line x1="300" y1="0" x2="300" y2="620"/>
    <line x1="450" y1="0" x2="450" y2="620"/>
    <line x1="600" y1="0" x2="600" y2="620"/>
    <line x1="750" y1="0" x2="750" y2="620"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="500" x2="900" y2="500"/>
  </g>

  <!-- ── ROW 1: AI Agents ── -->
  <g>
    <!-- Claude -->
    <rect x="60" y="30" width="160" height="52" rx="10" fill="url(#gv)" stroke="#7c6af7" stroke-opacity="0.4" stroke-width="1"/>
    <text x="140" y="50" text-anchor="middle" fill="#a78bfa" font-weight="700" font-size="13">Claude Code</text>
    <text x="140" y="68" text-anchor="middle" fill="#666" font-size="11">claude-code CLI</text>

    <!-- Cursor -->
    <rect x="370" y="30" width="160" height="52" rx="10" fill="url(#gv)" stroke="#7c6af7" stroke-opacity="0.4" stroke-width="1"/>
    <text x="450" y="50" text-anchor="middle" fill="#a78bfa" font-weight="700" font-size="13">Cursor</text>
    <text x="450" y="68" text-anchor="middle" fill="#666" font-size="11">IDE agent</text>

    <!-- Gemini -->
    <rect x="680" y="30" width="160" height="52" rx="10" fill="url(#gv)" stroke="#7c6af7" stroke-opacity="0.4" stroke-width="1"/>
    <text x="760" y="50" text-anchor="middle" fill="#a78bfa" font-weight="700" font-size="13">Gemini</text>
    <text x="760" y="68" text-anchor="middle" fill="#666" font-size="11">google AI agent</text>

    <text x="450" y="18" text-anchor="middle" fill="#555" font-size="11" letter-spacing="2" font-weight="600">AI AGENTS</text>
  </g>

  <!-- Arrows: agents → MCP -->
  <line x1="140" y1="82" x2="350" y2="148" stroke="url(#arrow-v)" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="6,3"/>
  <line x1="450" y1="82" x2="450" y2="148" stroke="url(#arrow-v)" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="760" y1="82" x2="550" y2="148" stroke="url(#arrow-v)" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="6,3"/>

  <!-- MCP label -->
  <text x="450" y="140" text-anchor="middle" fill="#444" font-size="10" letter-spacing="1">MCP (stdio)</text>

  <!-- ── ROW 2: MCP Server ── -->
  <rect x="290" y="155" width="320" height="60" rx="12" fill="url(#gv)" stroke="#7c6af7" stroke-opacity="0.6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="450" y="179" text-anchor="middle" fill="#c4b5fd" font-weight="700" font-size="15">MCP Server</text>
  <text x="450" y="198" text-anchor="middle" fill="#666" font-size="11">server/mcp_server.py · FastMCP · 20+ tools</text>

  <!-- Arrow: MCP → tools -->
  <line x1="450" y1="215" x2="450" y2="248" stroke="url(#arrow-v)" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── ROW 3: Tools layer ── -->
  <rect x="250" y="252" width="400" height="58" rx="12" fill="rgba(124,106,247,0.06)" stroke="#7c6af7" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="450" y="276" text-anchor="middle" fill="#a78bfa" font-weight="700" font-size="14">tools/</text>
  <text x="450" y="296" text-anchor="middle" fill="#555" font-size="11">stateless entry point · no cross-tool calls · no direct FAISS/graph access</text>

  <!-- Arrows: tools → retrieval layer -->
  <line x1="340" y1="310" x2="200" y2="358" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arr-b)"/>
  <line x1="450" y1="310" x2="450" y2="358" stroke="#7c6af7" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arr)"/>
  <line x1="560" y1="310" x2="700" y2="358" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arr-g)"/>

  <!-- ── ROW 4: Retrieval + Memory + Graph ── -->
  <!-- retrieval/hybrid.py -->
  <rect x="80" y="362" width="240" height="72" rx="10" fill="url(#gm)" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1.2"/>
  <text x="200" y="386" text-anchor="middle" fill="#7dd3fc" font-weight="700" font-size="13">retrieval/hybrid.py</text>
  <text x="200" y="404" text-anchor="middle" fill="#555" font-size="10">0.5×vector + 0.3×graph</text>
  <text x="200" y="420" text-anchor="middle" fill="#555" font-size="10">+ 0.2×behaviour · conf ≥0.25</text>

  <!-- orchestrator/ -->
  <rect x="350" y="362" width="200" height="72" rx="10" fill="url(#gv)" stroke="#7c6af7" stroke-opacity="0.35" stroke-width="1.2"/>
  <text x="450" y="386" text-anchor="middle" fill="#a78bfa" font-weight="700" font-size="13">orchestrator/</text>
  <text x="450" y="404" text-anchor="middle" fill="#555" font-size="10">classifier.py</text>
  <text x="450" y="420" text-anchor="middle" fill="#555" font-size="10">QUICK/STD/COMPLEX/EXPERT</text>

  <!-- graph/ -->
  <rect x="580" y="362" width="240" height="72" rx="10" fill="url(#gg)" stroke="#4ade80" stroke-opacity="0.4" stroke-width="1.2"/>
  <text x="700" y="386" text-anchor="middle" fill="#86efac" font-weight="700" font-size="13">graph/</text>
  <text x="700" y="404" text-anchor="middle" fill="#555" font-size="10">knowledge_graph.py</text>
  <text x="700" y="420" text-anchor="middle" fill="#555" font-size="10">NetworkX DiGraph · org edges</text>

  <!-- Arrows to storage -->
  <line x1="200" y1="434" x2="200" y2="472" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arr-b)"/>
  <line x1="450" y1="434" x2="450" y2="472" stroke="#7c6af7" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arr)"/>
  <line x1="700" y1="434" x2="700" y2="472" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arr-g)"/>

  <!-- ── ROW 5: Storage ── -->
  <!-- FAISS -->
  <rect x="60" y="476" width="190" height="58" rx="9" fill="rgba(56,189,248,0.06)" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
  <text x="155" y="499" text-anchor="middle" fill="#7dd3fc" font-weight="600" font-size="12">FAISS Index</text>
  <text x="155" y="518" text-anchor="middle" fill="#444" font-size="10">faiss.index · 384-dim · MiniLM</text>

  <!-- memory -->
  <rect x="270" y="476" width="190" height="58" rx="9" fill="rgba(124,106,247,0.06)" stroke="#7c6af7" stroke-opacity="0.3" stroke-width="1"/>
  <text x="365" y="499" text-anchor="middle" fill="#a78bfa" font-weight="600" font-size="12">memory/</text>
  <text x="365" y="518" text-anchor="middle" fill="#444" font-size="10">semantic · episodic · circuit_breaker</text>

  <!-- AST index -->
  <rect x="480" y="476" width="190" height="58" rx="9" fill="rgba(251,191,36,0.06)" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1"/>
  <text x="575" y="499" text-anchor="middle" fill="#fcd34d" font-weight="600" font-size="12">AST Index</text>
  <text x="575" y="518" text-anchor="middle" fill="#444" font-size="10">tree-sitter · 6 langs · symbol map</text>

  <!-- graph pkl -->
  <rect x="690" y="476" width="160" height="58" rx="9" fill="rgba(74,222,128,0.06)" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
  <text x="770" y="499" text-anchor="middle" fill="#86efac" font-weight="600" font-size="12">graph.pkl</text>
  <text x="770" y="518" text-anchor="middle" fill="#444" font-size="10">~/.cognirepo/ · org-wide</text>

  <!-- Storage bracket label -->
  <line x1="60" y1="548" x2="850" y2="548" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="450" y="563" text-anchor="middle" fill="#444" font-size="10" letter-spacing="2">.cognirepo/ · ~/.cognirepo/</text>

  <!-- ── ROW 6: Codebase ── -->
  <rect x="200" y="576" width="500" height="34" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="450" y="597" text-anchor="middle" fill="#444" font-size="12" font-weight="600" letter-spacing="1">YOUR CODEBASE (Python · JS · TS · Go · Rust · Java)</text>

  <!-- indexer arrow up to AST -->
  <line x1="575" y1="576" x2="575" y2="534" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,3" marker-end="url(#arr-y)"/>
  <text x="600" y="568" fill="#555" font-size="9">index-repo</text>

  <!-- Title / watermark -->
  <text x="450" y="610" text-anchor="middle" fill="#2a2a2a" font-size="10" letter-spacing="1">COGNIREPO ARCHITECTURE · github.com/ashlesh-t/cognirepo</text>
</svg>
